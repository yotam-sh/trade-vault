<svg width="340" height="120" viewBox="0 0 340 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  
  <!-- Icon -->
  <g transform="translate(10,20)">
    
    <!-- Database cylinder -->
    <ellipse cx="40" cy="15" rx="35" ry="12" fill="#1E1E24"></ellipse>
    <rect x="5" y="15" width="70" height="50" fill="#1E1E24"></rect>
    <ellipse cx="40" cy="65" rx="35" ry="12" fill="#1E1E24"></ellipse>
    
    <!-- Rising chart line -->
    <polyline points="15,50 30,40 45,45 60,25" stroke="#00E0A4" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"></polyline>
    
    <!-- Chart dots -->
    <circle cx="15" cy="50" r="3" fill="#00E0A4"></circle>
    <circle cx="30" cy="40" r="3" fill="#00E0A4"></circle>
    <circle cx="45" cy="45" r="3" fill="#00E0A4"></circle>
    <circle cx="60" cy="25" r="3" fill="#00E0A4"></circle>

    <!-- Lock Body -->
    <rect x="52" y="48" width="22" height="18" rx="4" fill="#2A2A33"></rect>

    <!-- Lock Shackle -->
    <path d="M63 48 v-8 a7 7 0 0 1 14 0 v8" stroke="#00E0A4" stroke-width="3" fill="none" stroke-linecap="round"></path>

    <!-- Keyhole -->
    <circle cx="63" cy="57" r="2.5" fill="#00E0A4"></circle>
    <rect x="61.8" y="59" width="2.4" height="5" rx="1" fill="#00E0A4"></rect>
    
  </g>

  <!-- App Name (Edit This Text) -->
  <text x="120" y="65" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="600" fill="#E6E6E6">
        TradeVault
  </text>

</svg>
